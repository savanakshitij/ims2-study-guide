<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMS2 Study Planner — HHN SS2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root{
    --bg:#0e0f14;--surface:#161820;--surface2:#1e2030;--border:#2a2d3e;
    --text:#e2e4f0;--muted:#6b7094;
    --accent-mat:#f97316;--accent-mech:#a78bfa;--accent-prog:#34d399;--accent-elec:#60a5fa;--accent-math:#f472b6;
    --ok:#34d399;--warn:#fbbf24;--risk:#f87171;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;padding:24px 20px 60px;max-width:1180px;margin:0 auto;}
  a{color:var(--accent-elec);}
  .mono{font-family:'Space Mono',monospace;}
  .header-top{display:flex;align-items:baseline;gap:12px;margin-bottom:6px;flex-wrap:wrap;}
  .title{font-size:23px;font-weight:700;letter-spacing:-0.5px;}
  .subtitle{color:var(--muted);font-size:12px;font-family:'Space Mono',monospace;}
  #syncStatus{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;}
  .countdown-bar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 18px;}
  .cd-chip{display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:6px;background:var(--surface);border:1px solid var(--border);font-size:12px;}
  .cd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .cd-label{color:var(--muted);}
  .cd-days{font-weight:700;font-family:'Space Mono',monospace;font-size:13px;}
  /* nav */
  .nav{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:0;}
  .nav button{background:none;border:none;color:var(--muted);font-family:inherit;font-size:14px;font-weight:600;padding:9px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .nav button:hover{color:var(--text);}
  .nav button.active{color:var(--text);border-bottom-color:var(--accent-elec);}
  .view{display:none;}
  .view.active{display:block;}
  /* generic */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;position:relative;}
  .section-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  @media(max-width:760px){.grid2,.grid3,.grid4{grid-template-columns:1fr 1fr;}}
  @media(max-width:480px){.grid2,.grid3,.grid4{grid-template-columns:1fr;}}
  .muted{color:var(--muted);}
  .small{font-size:12px;}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;font-family:'Space Mono',monospace;}
  .pill.ok{background:rgba(52,211,153,.12);color:var(--ok);}
  .pill.warn{background:rgba(251,191,36,.12);color:var(--warn);}
  .pill.risk{background:rgba(248,113,113,.14);color:var(--risk);}
  .pill.done{background:var(--surface2);color:var(--muted);}
  .bar-wrap{background:var(--surface2);border-radius:5px;height:8px;overflow:hidden;}
  .bar{height:100%;border-radius:5px;transition:width .3s ease;}
  input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;border-radius:7px;padding:7px 9px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent-elec);}
  label.fld{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--muted);}
  button.btn{background:var(--accent-elec);color:#0b1020;border:none;font-family:inherit;font-weight:700;font-size:13px;padding:9px 16px;border-radius:8px;cursor:pointer;}
  button.btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  button.btn:hover{filter:brightness(1.08);}
  .accent-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;}
  .mat{--ac:var(--accent-mat);} .mech{--ac:var(--accent-mech);} .prog{--ac:var(--accent-prog);} .elec{--ac:var(--accent-elec);} .math{--ac:var(--accent-math);}
  .ac-text{color:var(--ac);} .ac-bg{background:var(--ac);}
  /* hero / priority */
  .hero{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px;overflow:hidden;position:relative;}
  .hero h2{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
  .hero .big{font-size:26px;font-weight:700;margin-bottom:4px;}
  .hero .study{font-family:'Space Mono',monospace;font-size:15px;margin-bottom:14px;}
  .reasons{list-style:none;display:flex;flex-direction:column;gap:6px;}
  .reasons li{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text);}
  .reasons li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0;}
  /* plan items */
  .plan-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:9px;background:var(--surface2);margin-bottom:8px;border-left:3px solid var(--ac);}
  .plan-rank{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--ac);width:20px;}
  .plan-mid{flex:1;}
  .plan-name{font-weight:600;font-size:14px;}
  .plan-why{font-size:11px;color:var(--muted);margin-top:2px;}
  .plan-min{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;white-space:nowrap;}
  /* subject card */
  .subj-head{display:flex;align-items:center;gap:12px;cursor:pointer;}
  .subj-name{font-size:16px;font-weight:600;}
  .subj-meta{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;}
  .chevron{color:var(--muted);font-size:11px;transition:transform .25s;}
  .card.collapsed .chevron{transform:rotate(-90deg);}
  .subj-body{overflow:hidden;max-height:6000px;transition:max-height .35s ease,opacity .2s;opacity:1;margin-top:14px;}
  .card.collapsed .subj-body{max-height:0;opacity:0;margin-top:0;}
  .cfg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px;}
  .topic-row{display:grid;grid-template-columns:1fr 130px 70px 64px 70px 26px;gap:8px;align-items:center;padding:6px 0;border-top:1px solid var(--border);font-size:13px;}
  .topic-row .tname{line-height:1.25;}
  .topic-row.done .tname{color:var(--muted);}
  .topic-head{display:grid;grid-template-columns:1fr 130px 70px 64px 70px 26px;gap:8px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding-bottom:4px;}
  @media(max-width:680px){
    .topic-row,.topic-head{grid-template-columns:1fr 120px;grid-auto-rows:auto;}
    .topic-row .tnum{display:none;}.topic-head span:nth-child(n+3){display:none;}
    .topic-row select,.topic-row .miniflds{grid-column:1/3;}
  }
  .miniflds{display:flex;gap:8px;}
  .miniflds label{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;}
  .miniflds input{width:48px;padding:4px 6px;}
  .xbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;}
  .xbtn:hover{color:var(--risk);}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:15px;}
  .stat .v{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;}
  .stat .l{font-size:11px;color:var(--muted);margin-top:3px;}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  @media(max-width:680px){.week-grid{grid-template-columns:repeat(2,1fr);}}
  .day-col{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px;min-height:90px;}
  .day-col.past{opacity:.45;}
  .day-col.today{border-color:var(--accent-elec);}
  .day-h{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:6px;display:flex;justify-content:space-between;}
  .chip-s{font-size:11px;padding:4px 6px;border-radius:6px;margin-bottom:5px;border-left:3px solid var(--ac);background:var(--surface);}
  .chip-s .m{font-family:'Space Mono',monospace;color:var(--muted);font-size:10px;}
  .rec{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;border-radius:8px;background:var(--surface2);margin-bottom:7px;font-size:13px;}
  .rec .ic{flex-shrink:0;}
  .barbar{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:10px;}
  .barbar .b{flex:1;background:var(--accent-elec);border-radius:4px 4px 0 0;min-height:2px;position:relative;}
  .barbar .bl{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:9px;color:var(--muted);}
  .sess-row{display:flex;gap:10px;align-items:center;font-size:12px;padding:7px 0;border-top:1px solid var(--border);}
  .timerbox{font-family:'Space Mono',monospace;font-size:30px;font-weight:700;text-align:center;margin:8px 0;}
</style>
</head>
<body>
<div class="header-top">
  <div class="title">IMS2 — Study Planner</div>
  <div class="subtitle">Hochschule Heilbronn · SS2026</div>
  <span id="syncStatus">● offline</span>
</div>
<div class="countdown-bar" id="countdownBar"></div>

<div class="nav" id="nav">
  <button data-view="today" class="active">Today</button>
  <button data-view="subjects">Subjects</button>
  <button data-view="log">Log session</button>
  <button data-view="dashboard">Dashboard</button>
  <button data-view="plan">Plan</button>
</div>

<div class="view active" id="view-today"></div>
<div class="view" id="view-subjects"></div>
<div class="view" id="view-log"></div>
<div class="view" id="view-dashboard"></div>
<div class="view" id="view-plan"></div>

<script>
/* ============================================================
   SEED DATA — your real subjects & topics (used on first run)
   ============================================================ */
const SEED=[
 {id:'mat',name:'Materials',cls:'mat',prof:'Wettlaufer · Gleiter/Gramlich',exam:'2026-07-03',weekly:5,estHours:50,importance:4,credits:5,topics:[
   'Metals: classification, selection & atomic bonds','Metals: crystalline structure & lattice defects','Metals: alloy & microstructure formation, diffusion','Metals: phase transformations & phase diagrams','Metals: eutectic transformation','Metals: iron-carbon phase diagram (reading it)','Metals: heat treatment — TTT/TTA, steel treatment','Metals: precipitation hardening of aluminium','Metals: alloying elements & standardisation','Metals: deformation, slip planes, dislocations','Metals: hardening, recovery & recrystallisation','Metals: extraction & recycling (Fe, Al, Cu)','Metals: metallography & testing methods','Metals: failure — wear, fracture, fatigue, corrosion','Metals: non-metallic materials (ceramics, glass)','Plastics: classification & comparison with other materials','Plastics: chemical fundamentals & bonding types','Plastics: manufacture & formation reactions','Plastics: chain architecture (linear, branched, network)','Plastics: morphology — amorphous vs semi-crystalline','Plastics: degrees of cross-linking','Plastics: mechanical properties & stress-strain','Plastics: viscoelastic behaviour, creep & creep modulus','Plastics: impact resistance & temperature dependence','Plastics: thermal analysis (DSC, glass transition)','Plastics: additives, fillers & plasticisers','Plastics: key thermoplastics (PE, PP, PVC, PMMA, PA…)','Plastics: thermosets (epoxy, phenolic, UP, aminoplasts)','Plastics: elastomers & rubber — vulcanisation, TPEs','Plastics: fibre-reinforced plastics (glass, carbon, aramid)','Plastics: rheology, viscosity, shear rate','Plastics: processing (injection moulding, extrusion, films)','Plastics: joining methods & recycling','Plastics: bioplastics & bio-based plastics']},
 {id:'mech',name:'Eng. Mechanics 2/3',cls:'mech',prof:'von Tardy-Tuch · Hufnagel',exam:'2026-07-13',weekly:4,estHours:30,importance:3,credits:5,topics:[
   'EM2: Stress & strain in rods (tension/compression)','EM2: Material properties (Rf, Rm, Young’s modulus)','EM2: Shear stress & strain, contraction','EM2: Planar stress & coordinate transformation','EM2: Principal & equivalent stresses (Mohr)','EM2: Moment of inertia (area)','EM2: Deflection curve of beams','EM3: Vector operations & moment of a bound vector','EM3: Kinematics — Cartesian & polar coordinates','EM3: Translation, rotation & general planar motion','EM3: Instantaneous pole (construction & pole curves)','EM3: Impulse & angular momentum (spin)','EM3: Moments of inertia & Huygens-Steiner','EM3: Work, energy principle & conservative forces']},
 {id:'prog',name:'Programming 2 (C)',cls:'prog',prof:'Prof. Saraç Heinz',exam:'2026-07-17',weekly:4,estHours:24,importance:3,credits:5,topics:[
   'Recursion: factorial, power, Fibonacci','Recursion vs iteration & the call stack','Pointers: declaration, dereferencing, arithmetic','Pointers 2: pointers to pointers, pointers & arrays','Strings in C & string handling functions','Structs: defining, members, the -> operator','Arrays of structs & sorting records','Dynamic memory: malloc / free, NULL checks','Singly linked lists: insert, delete, traverse','Doubly linked lists: insert, delete, sort','enum, union & typedef','Tracing & debugging pointer-based code']},
 {id:'elec',name:'Electrical Engineering',cls:'elec',prof:'Prof. Fischer',exam:'2026-07-22',weekly:5,estHours:50,importance:4,credits:5,topics:[
   'AC: Sinusoidal quantities — amplitude, ω, phase, RMS','AC: Phasor / vector diagrams','AC: Complex impedance — reactance of R, L, C','AC: Networks — series, parallel & mixed R-L-C','AC: Series resonant circuit (f_r, impedance)','AC: Parallel resonant circuit','AC: Power — active, reactive, apparent, cos φ','AC: Single-phase AC power problems','AC: Three-phase systems & power','Mag: Magnetic circuits — MMF, flux, reluctance, air gaps','Mag: Equivalent magnetic circuit diagrams','Mag: Mutual induction / coupled coils (dot convention)','Mag: Transformers (leakage, main flux, copper losses)','Semi: Diode fundamentals (forward voltage, blocking)','Semi: Diode networks (idealized, equivalent circuits)','Semi: Zener diodes (breakdown, voltage reference)','Semi: BJT — β, regions, switching','Semi: MOSFET — symbols, regions, switching','Semi: BJT vs MOSFET comparison','OpAmp: Inverting & non-inverting (gain formulas)','OpAmp: Voltage follower, V-I converter','OpAmp: Gain in dB & cascaded stages','OpAmp: Active filters — Sallen-Key, transfer fns','Lab: Capacitors (charging, energy storage)','Lab: Rectifiers — half-wave, bridge, three-phase, ripple','Lab: AC voltage — RC/RL, low-pass, RLC resonance','Lab: Op-amp — current source, Sallen-Key filter']},
 {id:'math',name:'Mathematics 2',cls:'math',prof:'Prof. Pargmann',exam:'2026-07-23',weekly:4,estHours:30,importance:4,credits:5,topics:[
   'DE 1st order: separation of variables','DE 1st order: exponential approach','Homogeneous vs inhomogeneous solutions','Linear DE 2nd order with constant coefficients','Fitting integration constants (initial values)','Laplace transform: definition & standard table','Laplace properties & solving IVPs','Functions of several variables: domain & limits','Partial derivatives & total differential','Gradient & directional behaviour','Extreme value determination & Hessian matrix','Double integrals (Cartesian & polar)','Triple integrals (cylindrical & spherical)','Area & volume calculations']}
];

/* ============================================================
   CLOUD SYNC — Netlify Blobs function. Stores the whole app state.
   ============================================================ */
const SYNC_URL='/.netlify/functions/progress';
const POLL_MS=8000;
const cloudEnabled=location.protocol==='http:'||location.protocol==='https:';
const KEY='ims2_app_v2';

const STATUS=[
  {k:'not_started',l:'Not started',w:0,c:'var(--muted)'},
  {k:'learning',l:'Learning',w:.25,c:'var(--accent-elec)'},
  {k:'practicing',l:'Practicing',w:.55,c:'var(--accent-math)'},
  {k:'confident',l:'Confident',w:.8,c:'var(--accent-mech)'},
  {k:'mastered',l:'Mastered',w:1,c:'var(--accent-prog)'}
];
const statusW=k=>(STATUS.find(s=>s.k===k)||STATUS[0]).w;

/* utils */
const uid=()=>Math.random().toString(36).slice(2,9);
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const pad=n=>String(n).padStart(2,'0');
function todayISO(d){d=d||new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function parseDate(iso){const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d);}
function midnight(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
function daysUntil(iso){return Math.ceil((parseDate(iso)-midnight(new Date()))/86400000);}
function weekStart(d){const x=midnight(d||new Date());const off=(x.getDay()+6)%7;x.setDate(x.getDate()-off);return x;}
function monthStart(d){d=d||new Date();return new Date(d.getFullYear(),d.getMonth(),1);}
const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const round=(x,n=0)=>{const f=Math.pow(10,n);return Math.round(x*f)/f;}

/* ============================================================
   STATE
   ============================================================ */
let state=null, currentView='today', timer={running:false,start:0,sub:'',topic:''};

function buildSeed(){
  const subjects=SEED.map(s=>{
    const per=Math.max(.5,round(s.estHours/s.topics.length,1));
    return {id:s.id,name:s.name,cls:s.cls,prof:s.prof,exam:s.exam,weekly:s.weekly,estHours:s.estHours,importance:s.importance,credits:s.credits,
      topics:s.topics.map(t=>({id:uid(),name:t,status:'not_started',confidence:3,difficulty:3,hoursRemaining:per}))};
  });
  return {version:2,planStart:todayISO(),settings:{dailyMinutes:180},subjects,sessions:[],updatedAt:Date.now()};
}
function saveLocal(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function loadLocal(){try{const r=localStorage.getItem(KEY);if(r){const o=JSON.parse(r);if(o&&o.subjects)return o;}}catch(e){}return null;}
function touch(){state.updatedAt=Date.now();saveLocal();schedulePush();render();}

/* sync */
function setStatus(t,c){const el=document.getElementById('syncStatus');if(el){el.textContent='● '+t;el.style.color=c||'var(--muted)';}}
let pushTimer=null;
function schedulePush(){if(!cloudEnabled)return;clearTimeout(pushTimer);pushTimer=setTimeout(pushRemote,500);}
async function pushRemote(){if(!cloudEnabled)return;try{
  setStatus('syncing…','var(--accent-elec)');
  const res=await fetch(SYNC_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:state,updated_at:state.updatedAt})});
  if(!res.ok)throw 0;setStatus('synced','var(--ok)');
}catch(e){setStatus('offline (saved locally)','var(--warn)');}}
async function pullRemote(){if(!cloudEnabled)return;try{
  const res=await fetch(SYNC_URL,{headers:{'Accept':'application/json'}});if(!res.ok)throw 0;
  const r=await res.json();const remoteAt=(r&&r.updated_at)||0;
  if(r&&r.data&&r.data.subjects&&remoteAt>state.updatedAt){state=r.data;saveLocal();render();}
  else if(state.updatedAt>0&&(!r||!r.data||!r.data.subjects)){pushRemote();}
  setStatus('synced','var(--ok)');
}catch(e){setStatus('offline (saved locally)','var(--warn)');}}

/* ============================================================
   METRICS + RECOMMENDATION ENGINE  (modular — swap for an LLM later)
   Engine.subject(sub) returns all derived metrics for one subject.
   Engine.* read ONLY from `state`; the UI reads ONLY from Engine.
   ============================================================ */
const W={urgency:.35,behind:.25,confidence:.15,difficulty:.10,stale:.10,importance:.05};
const Engine={
  hoursStudied(sub,since){return state.sessions.filter(s=>s.subjectId===sub.id&&(!since||parseDate(s.date)>=since)).reduce((a,s)=>a+s.durationMin/60,0);},
  lastStudied(sub){const ds=state.sessions.filter(s=>s.subjectId===sub.id).map(s=>parseDate(s.date).getTime());return ds.length?new Date(Math.max(...ds)):null;},
  progressFrac(sub){if(!sub.topics.length)return 0;return sub.topics.reduce((a,t)=>a+statusW(t.status),0)/sub.topics.length;},
  avgConf(sub){if(!sub.topics.length)return 0;return sub.topics.reduce((a,t)=>a+(+t.confidence||0),0)/sub.topics.length;},
  avgDiff(sub){if(!sub.topics.length)return 0;return sub.topics.reduce((a,t)=>a+(+t.difficulty||0),0)/sub.topics.length;},
  idealFrac(sub){const st=parseDate(state.planStart),ex=parseDate(sub.exam),now=midnight(new Date());if(ex<=st)return daysUntil(sub.exam)<=0?1:0;return clamp((now-st)/(ex-st),0,1);},
  subject(sub){
    const days=daysUntil(sub.exam);
    const prog=this.progressFrac(sub);
    const ideal=this.idealFrac(sub);
    const behind=clamp(ideal-prog,0,1);
    const conf=this.avgConf(sub), diff=this.avgDiff(sub);
    const hoursDone=this.hoursStudied(sub);
    const last=this.lastStudied(sub);
    const dsl=last?Math.floor((midnight(new Date())-midnight(last))/86400000):99;
    // priority components 0..1
    const cUrg=days<=0?1:clamp((45-days)/45,0,1);
    const cBehind=behind;
    const cConf=clamp((10-conf)/10,0,1);
    const cDiff=clamp((diff-1)/4,0,1);
    const cStale=clamp(dsl/7,0,1);
    const cImp=clamp((sub.importance-1)/4,0,1);
    const contrib={urgency:W.urgency*cUrg,behind:W.behind*cBehind,confidence:W.confidence*cConf,difficulty:W.difficulty*cDiff,stale:W.stale*cStale,importance:W.importance*cImp};
    const raw=Object.values(contrib).reduce((a,b)=>a+b,0);
    const score=days<0?0:round(raw*100,1);
    const recHours=Math.max(0,Math.round(sub.estHours*(1-prog)));
    const readiness=Math.round(100*(.45*prog + .30*(conf/10) + .25*clamp(hoursDone/sub.estHours,0,1)));
    let risk='ok';
    if(days<0)risk='done';
    else{if(behind>.10||readiness<60)risk='warn';if(behind>.22||readiness<42||(days<=10&&prog<.55))risk='risk';}
    const behindHours=Math.max(0,Math.round(ideal*sub.estHours-hoursDone));
    // human reasons sorted by contribution
    const rk=[
      {k:'urgency',v:cUrg,t:days<=0?'Exam is today/overdue':`Exam is in ${days} days`},
      {k:'behind',v:cBehind,t:`${Math.round(behind*100)}% behind your ideal pace`},
      {k:'confidence',v:cConf,t:`Confidence is low (${conf.toFixed(1)}/10)`},
      {k:'difficulty',v:cDiff,t:`Difficult material (${diff.toFixed(1)}/5)`},
      {k:'stale',v:cStale,t:dsl>=99?'Not studied yet':`Not studied in ${dsl} day${dsl===1?'':'s'}`},
      {k:'importance',v:cImp,t:'High-weight subject'}
    ].map(r=>({...r,c:contrib[r.k]})).sort((a,b)=>b.c-a.c);
    const reasons=rk.filter(r=>r.v>=.2).slice(0,4);
    if(reasons.length<2)reasons.push(...rk.filter(r=>!reasons.includes(r)).slice(0,2-reasons.length));
    return {sub,days,prog,ideal,behind,behindHours,conf,diff,hoursDone,dsl,score,recHours,readiness,risk,reasons,contrib};
  },
  all(){return state.subjects.map(s=>this.subject(s)).sort((a,b)=>b.score-a.score);},
  active(){return this.all().filter(m=>m.days>=0);},
  dailyPlan(){
    const act=this.active();if(!act.length)return [];
    const cap=state.settings.dailyMinutes;
    const top=act.slice(0,Math.min(4,act.length));
    const sw=top.map(m=>Math.pow(m.score,1.25));
    const sum=sw.reduce((a,b)=>a+b,0)||1;
    let items=top.map((m,i)=>{let mins=Math.round(cap*sw[i]/sum/15)*15;mins=clamp(mins,30,120);return {m,mins};});
    // trim/pad to capacity
    let tot=items.reduce((a,b)=>a+b.mins,0);
    while(tot>cap&&items.length){const j=items.reduce((mi,it,idx,arr)=>it.mins<arr[mi].mins?idx:mi,0);items[j].mins-=15;tot-=15;if(items[j].mins<=15)items.splice(j,1),tot=items.reduce((a,b)=>a+b.mins,0);}
    return items.filter(it=>it.mins>=15);
  },
  weeklyPlan(){
    const act=this.active();const ws=weekStart();const cap=state.settings.dailyMinutes;
    const days=[...Array(7)].map((_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return {date:d,iso:todayISO(d),load:0,items:[]};});
    const todayMid=midnight(new Date());
    const eligible=days.filter(d=>d.date>=todayMid);
    const pool=eligible.length?eligible:[days[6]];
    act.forEach(m=>{
      const totMin=Math.round(m.sub.weekly*60);
      const n=clamp(Math.round(totMin/75),1,5);
      const chunk=Math.max(30,Math.round(totMin/n/15)*15);
      for(let i=0;i<n;i++){
        const slot=pool.filter(d=>d.load+chunk<=cap*1.34).sort((a,b)=>a.load-b.load)[0]||pool.sort((a,b)=>a.load-b.load)[0];
        slot.load+=chunk;slot.items.push({sub:m.sub,mins:chunk});
      }
    });
    return days;
  },
  recommendations(){
    const out=[];const act=this.active();
    act.forEach(m=>{
      if(m.days<=8)out.push({ic:'⏰',tone:'risk',t:`${m.sub.name} exam is only ${m.days} day${m.days===1?'':'s'} away.`,score:100-m.days});
      if(m.dsl>=5&&m.dsl<99)out.push({ic:'💤',tone:'warn',t:`${m.sub.name} has been ignored for ${m.dsl} days.`,score:40+m.dsl});
      if(m.dsl>=99)out.push({ic:'🆕',tone:'warn',t:`You haven't logged any time on ${m.sub.name} yet.`,score:30});
      if(m.behindHours>=4)out.push({ic:'📉',tone:'warn',t:`You're about ${m.behindHours}h behind on ${m.sub.name}.`,score:35+m.behindHours});
      const todayMin=state.sessions.filter(s=>s.subjectId===m.sub.id&&s.date===todayISO()).reduce((a,s)=>a+s.durationMin,0);
      if(todayMin>=180)out.push({ic:'🔄',tone:'ok',t:`You've studied ${m.sub.name} ${round(todayMin/60,1)}h today — switch subjects for better retention.`,score:20});
    });
    const totBehind=act.reduce((a,m)=>a+m.behindHours,0);
    if(totBehind>=6)out.push({ic:'🧮',tone:'risk',t:`You're roughly ${totBehind}h behind your targets overall.`,score:90});
    if(!out.length)out.push({ic:'✅',tone:'ok',t:'You\'re on track across the board. Keep the streak going.',score:1});
    return out.sort((a,b)=>b.score-a.score).slice(0,6);
  },
  forecast(){
    const act=this.active();
    const wk=weekStart();
    const last7=midnight(new Date());last7.setDate(last7.getDate()-7);
    const currentPace=state.sessions.filter(s=>parseDate(s.date)>=last7).reduce((a,s)=>a+s.durationMin/60,0);
    const requiredPace=act.reduce((a,m)=>a+m.recHours/Math.max(m.days/7,.3),0);
    return {currentPace:round(currentPace,1),requiredPace:round(requiredPace,1),deficit:round(Math.max(0,requiredPace-currentPace),1)};
  }
};

function toggleTimer(){
  const btn=document.getElementById('timerBtn');
  if(!timer.running){timer.running=true;timer.start=Date.now();timer.sub=document.getElementById('tSub').value;timer.topic=document.getElementById('tTopic').value;btn.textContent='Stop';timerInt=setInterval(updateTimerDisplay,1000);}
  else{timer.running=false;clearInterval(timerInt);btn.textContent='Start';
    const mins=Math.max(1,Math.round((Date.now()-timer.start)/60000));
    // prefill manual form
    document.getElementById('mSub').value=timer.sub;fillTopics('mTopic',timer.sub);document.getElementById('mTopic').value=timer.topic;
    document.getElementById('mDur').value=mins;document.getElementById('mSub').scrollIntoView({behavior:'smooth',block:'center'});
  }
}
function updateTimerDisplay(){const el=document.getElementById('timerDisplay');if(!el)return;const ms=timer.running?Date.now()-timer.start:0;const s=Math.floor(ms/1000);el.textContent=pad(Math.floor(s/60))+':'+pad(s%60);}

function saveSessionFromForm(){
  const subId=document.getElementById('mSub').value;
  const topicId=document.getElementById('mTopic').value;
  const dur=Math.max(1,+document.getElementById('mDur').value||0);
  const sess={id:uid(),subjectId:subId,topicId:topicId||null,date:document.getElementById('mDate').value||todayISO(),durationMin:dur,focus:+document.getElementById('mFocus').value||null,confBefore:+document.getElementById('mCb').value||null,confAfter:+document.getElementById('mCa').value||null,notes:document.getElementById('mNotes').value.trim()};
  state.sessions.push(sess);
  if(document.getElementById('mBump').checked&&topicId){
    const sub=state.subjects.find(s=>s.id===subId);const t=sub&&sub.topics.find(x=>x.id===topicId);
    if(t){if(sess.confAfter)t.confidence=sess.confAfter;
      const order=['not_started','learning','practicing','confident','mastered'];
      const cur=order.indexOf(t.status);let want=cur;
      if(sess.confAfter>=9)want=4;else if(sess.confAfter>=7)want=Math.max(cur,3);else if(sess.confAfter>=5)want=Math.max(cur,2);else want=Math.max(cur,1);
      t.status=order[want];
      t.hoursRemaining=Math.max(0,round(t.hoursRemaining-dur/60,1));
    }
  }
  touch();
}

function wireSubjects(){
  document.querySelectorAll('[data-toggle]').forEach(h=>h.addEventListener('click',()=>{h.closest('.card').classList.toggle('collapsed');}));
  document.querySelectorAll('.card[data-sid]').forEach(card=>{
    const sid=card.dataset.sid;const sub=state.subjects.find(s=>s.id===sid);
    card.querySelectorAll('[data-cfg]').forEach(inp=>inp.addEventListener('change',()=>{
      const f=inp.dataset.cfg;sub[f]=f==='exam'?inp.value:(+inp.value||0);touch();}));
    card.querySelectorAll('.topic-row').forEach(row=>{
      const t=sub.topics.find(x=>x.id===row.dataset.tid);
      row.querySelectorAll('[data-tf]').forEach(inp=>inp.addEventListener('change',()=>{
        const f=inp.dataset.tf;t[f]=f==='status'?inp.value:(+inp.value||0);touch();}));
      const del=row.querySelector('[data-del]');if(del)del.addEventListener('click',()=>{sub.topics=sub.topics.filter(x=>x.id!==t.id);touch();});
    });
    const addInp=card.querySelector('[data-addtopic]');const addBtn=card.querySelector('[data-addbtn]');
    const doAdd=()=>{const v=addInp.value.trim();if(!v)return;sub.topics.push({id:uid(),name:v,status:'not_started',confidence:3,difficulty:3,hoursRemaining:1.5});touch();};
    if(addBtn)addBtn.addEventListener('click',doAdd);
    if(addInp)addInp.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});
  });
  const addS=document.getElementById('addSubject');
  if(addS)addS.addEventListener('click',()=>{
    const name=prompt('Subject name?');if(!name)return;
    const exam=prompt('Exam date (YYYY-MM-DD)?',todayISO());
    state.subjects.push({id:uid(),name,cls:['mat','mech','prog','elec','math'][state.subjects.length%5],prof:'',exam:exam||todayISO(),weekly:4,estHours:24,importance:3,credits:5,topics:[]});
    touch();
  });
}

/* re-wire after each subjects render (render() replaces innerHTML) */
const _renderSubjects=renderSubjects;
renderSubjects=function(){_renderSubjects();wireSubjects();};

/* nav */
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button[data-view]');if(!b)return;
  currentView=b.dataset.view;
  document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x===b));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+currentView));
  render();
});

/* ============================================================
   INIT
   ============================================================ */
state=loadLocal()||buildSeed();
saveLocal();
render();
if(cloudEnabled){setStatus('connecting…','var(--accent-elec)');pullRemote();setInterval(pullRemote,POLL_MS);}
else{setStatus('local only (open the Netlify URL to sync)','var(--muted)');}
</script>
