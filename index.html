<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMS2 Study Guide — HHN SS2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root{
    --bg:#0e0f14;--surface:#161820;--surface2:#1e2030;--border:#2a2d3e;
    --text:#e2e4f0;--muted:#6b7094;
    --accent-mat:#f97316;--accent-mech:#a78bfa;--accent-prog:#34d399;--accent-elec:#60a5fa;--accent-math:#f472b6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;padding:26px 20px 50px;max-width:820px;margin:0 auto;}
  .header-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
  .title{font-size:23px;font-weight:700;letter-spacing:-0.5px;}
  .subtitle{color:var(--muted);font-size:12px;font-family:'Space Mono',monospace;}
  #syncStatus{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;}
  .countdown-bar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 18px;}
  .cd-chip{display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:6px;background:var(--surface);border:1px solid var(--border);font-size:12px;}
  .cd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .cd-label{color:var(--muted);}
  .cd-days{font-weight:700;font-family:'Space Mono',monospace;font-size:13px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;position:relative;overflow:hidden;}
  .accent-bar{position:absolute;top:0;left:0;right:0;height:3px;}
  .mat .accent-bar{background:var(--accent-mat);} .mech .accent-bar{background:var(--accent-mech);}
  .prog .accent-bar{background:var(--accent-prog);} .elec .accent-bar{background:var(--accent-elec);} .math .accent-bar{background:var(--accent-math);}
  .mat{--ac:var(--accent-mat);} .mech{--ac:var(--accent-mech);} .prog{--ac:var(--accent-prog);} .elec{--ac:var(--accent-elec);} .math{--ac:var(--accent-math);}
  .section-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
  .next-item{display:flex;align-items:center;gap:10px;padding:8px 0;}
  .next-rank{font-family:'Space Mono',monospace;font-weight:700;color:var(--ac);width:18px;}
  .next-name{font-weight:600;font-size:14px;color:var(--ac);}
  .next-why{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:1px;}
  .overall{display:flex;align-items:center;gap:14px;}
  .overall .pct{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;}
  .bar-wrap{flex:1;background:var(--surface2);border-radius:6px;height:9px;overflow:hidden;}
  .bar{height:100%;border-radius:6px;transition:width .3s ease;}
  .ovbar{background:linear-gradient(90deg,var(--accent-mat),var(--accent-mech),var(--accent-prog),var(--accent-elec),var(--accent-math));}
  /* subject */
  .subj-head{display:flex;align-items:center;gap:10px;cursor:pointer;}
  .subj-name{font-size:15px;font-weight:600;}
  .subj-meta{margin-left:auto;display:flex;align-items:center;gap:9px;}
  .date-chip{font-family:'Space Mono',monospace;font-size:11px;padding:3px 8px;border-radius:4px;color:#0e0f14;font-weight:700;white-space:nowrap;background:var(--ac);}
  .pct-chip{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);}
  .chevron{color:var(--muted);font-size:11px;transition:transform .25s;}
  .card.collapsed .chevron{transform:rotate(-90deg);}
  .subj-body{overflow:hidden;max-height:4000px;transition:max-height .35s ease,opacity .2s;opacity:1;margin-top:12px;}
  .card.collapsed .subj-body{max-height:0;opacity:0;margin-top:0;}
  .prof{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:10px;}
  .time-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--surface2);border-radius:9px;padding:10px 12px;margin-bottom:12px;}
  .time-val{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;}
  .time-sub{font-size:11px;color:var(--muted);}
  .tbtn{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:5px 9px;border-radius:6px;cursor:pointer;}
  .tbtn:hover{border-color:var(--ac);color:var(--ac);}
  .tbtn.edit{margin-left:auto;}
  .conf-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .conf-row input[type=range]{flex:1;accent-color:var(--ac);}
  .conf-val{font-family:'Space Mono',monospace;font-size:12px;color:var(--ac);white-space:nowrap;text-align:right;}
  .papers-box{background:var(--surface2);border-radius:9px;padding:10px 12px;margin-bottom:12px;}
  .papers-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px;}
  .papers-advice{font-family:'Space Mono',monospace;font-size:12px;color:var(--ac);}
  .num{width:58px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:13px;border-radius:6px;padding:5px 7px;}
  .num:focus{outline:none;border-color:var(--ac);}
  .topic-list{list-style:none;display:flex;flex-direction:column;gap:3px;}
  .topic-item{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;padding:6px 8px;border-radius:6px;}
  .topic-item:hover{background:var(--surface2);}
  .check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0e0f14;}
  .topic-item.done .check{background:var(--ac);border-color:var(--ac);}
  .topic-text{font-size:13px;line-height:1.3;}
  .topic-item.done .topic-text{opacity:.4;text-decoration:line-through;}
  .prog-bar-wrap{margin-top:12px;background:var(--surface2);border-radius:5px;height:6px;overflow:hidden;}
  .prog-bar{height:100%;border-radius:5px;background:var(--ac);transition:width .3s ease;}
</style>
</head>
<body>
<div class="header-top">
  <div class="title">IMS2 — Study Guide</div>
  <div class="subtitle">Hochschule Heilbronn · SS2026</div>
  <span id="syncStatus">● offline</span>
</div>
<div class="countdown-bar" id="countdownBar"></div>
<div class="card" id="nextCard"></div>
<div class="card"><div class="section-title">Overall progress</div><div class="overall"><span class="pct" id="ovPct">0%</span><div class="bar-wrap"><div class="bar ovbar" id="ovBar" style="width:0%"></div></div></div></div>
<div id="cards"></div>

<script>
/* ---- subjects & topics (simple checklist, like before) ---- */
const SEED=[
 {id:'mat',name:'Materials',cls:'mat',prof:'Wettlaufer (Metals) · Gleiter/Gramlich (Plastics)',exam:'2026-07-03',topics:[
  'Metals: classification, selection & atomic bonds','Metals: crystalline structure & lattice defects','Metals: alloy & microstructure formation, diffusion','Metals: phase transformations & phase diagrams','Metals: eutectic transformation','Metals: iron-carbon phase diagram (reading it)','Metals: heat treatment — TTT/TTA, steel treatment','Metals: precipitation hardening of aluminium','Metals: alloying elements & standardisation','Metals: deformation, slip planes, dislocations','Metals: hardening, recovery & recrystallisation','Metals: extraction & recycling (Fe, Al, Cu)','Metals: metallography & testing methods','Metals: failure — wear, fracture, fatigue, corrosion','Metals: non-metallic materials (ceramics, glass)','Plastics: classification & comparison with other materials','Plastics: chemical fundamentals & bonding types (covalent, van der Waals)','Plastics: manufacture & formation reactions (polymerisation, polyaddition, polycondensation)','Plastics: chain architecture (linear, branched, network; homo/co-polymers)','Plastics: morphology — amorphous vs semi-crystalline, spherulites','Plastics: degrees of cross-linking (thermoplast/thermoset/elastomer)','Plastics: mechanical properties & tensile stress-strain diagrams','Plastics: viscoelastic behaviour, creep & creep modulus','Plastics: impact resistance & temperature dependence','Plastics: thermal properties & analysis (DSC, glass transition, crystallinity)','Plastics: additives, fillers & plasticisers','Plastics: key thermoplastics (PE, PP, PVC, PMMA, PA, PET, PC, PTFE, ABS, POM, PBT, PLA)','Plastics: thermosets (epoxy, phenolic, UP, aminoplasts)','Plastics: elastomers & rubber — vulcanisation, NR vs synthetic, TPEs','Plastics: fibre-reinforced plastics (glass, carbon, aramid)','Plastics: behaviour in the melt — rheology, viscosity, shear rate','Plastics: processing methods (injection moulding, extrusion, films)','Plastics: joining methods & recycling','Plastics: bioplastics & bio-based plastics']},
 {id:'mech',name:'Engineering Mechanics 2/3',cls:'mech',prof:'von Tardy-Tuch (EM2) · Hufnagel (EM3)',exam:'2026-07-13',topics:[
  'EM2: Stress & strain in rods (tension/compression)','EM2: Material properties (Rf, Rm, Young’s modulus)','EM2: Shear stress & strain, contraction','EM2: Planar stress & coordinate transformation','EM2: Principal stresses & equivalent stresses (Mohr)','EM2: Moment of inertia (area)','EM2: Deflection curve of beams','EM3: Vector operations & moment of a bound vector','EM3: Kinematics — Cartesian & polar coordinates','EM3: Translation, rotation & general planar motion','EM3: Instantaneous pole (construction & pole curves)','EM3: Impulse & angular momentum (spin)','EM3: Moments of inertia & Huygens-Steiner theorem','EM3: Work, energy principle & conservative forces']},
 {id:'prog',name:'Programming 2',cls:'prog',prof:'Prof. Saraç Heinz',exam:'2026-07-17',topics:[
  'Recursion: factorial, power, Fibonacci','Recursion vs iteration & the call stack','Pointers: declaration, dereferencing, arithmetic','Pointers 2: pointers to pointers, pointers & arrays','Strings in C & string handling functions','Structs: defining, members, the -> operator','Arrays of structs & sorting records','Dynamic memory: malloc / free, NULL checks','Singly linked lists: insert, delete, traverse','Doubly linked lists: insert, delete, sort','enum, union & typedef','Tracing & debugging pointer-based code']},
 {id:'elec',name:'Electrical Engineering',cls:'elec',prof:'Prof. Fischer',exam:'2026-07-22',topics:[
  'AC: Sinusoidal quantities — amplitude, ω, phase, RMS','AC: Phasor / vector diagrams','AC: Complex impedance — reactance of R, L, C (X_L, X_C)','AC: Networks — series, parallel & mixed R-L-C circuits','AC: Series resonant circuit (f_r, impedance at resonance)','AC: Parallel resonant circuit','AC: Power — active P, reactive Q, apparent S, power factor cos φ','AC: Single-phase AC power problems','AC: Three-phase systems & power (balanced + unbalanced loads)','Mag: Magnetic circuits — MMF (θ), flux (Φ), reluctance (R_m), air gaps','Mag: Equivalent magnetic circuit diagrams','Mag: Mutual induction / coupled coils (dot convention, ± polarity)','Mag: Transformers (leakage, main flux, copper losses)','Semi: Diode fundamentals (forward voltage, conducting/blocking, types)','Semi: Diode networks (idealized, equivalent circuits, node voltages)','Semi: Zener diodes (breakdown, voltage reference, series resistor sizing)','Semi: BJT — β, regions (cut-off/active/saturation), switching','Semi: MOSFET — enhancement-type symbols & pins, regions, switching','Semi: BJT vs MOSFET comparison (conceptual)','OpAmp: Inverting & non-inverting amplifiers (gain formulas)','OpAmp: Voltage follower, V-I converter (input/output impedance)','OpAmp: Gain in dB & cascaded amplifier stages','OpAmp: Active filters — low/high/band-pass, Sallen-Key, transfer fns, 1st/2nd order','Lab: Capacitors (charging, energy storage)','Lab: Rectifiers — half-wave, bridge (B2), three-phase, ripple, smoothing cap','Lab: AC voltage — RC/RL series, low-pass filter, RLC resonance','Lab: Op-amp — current source, Sallen-Key filter']},
 {id:'math',name:'Mathematics 2',cls:'math',prof:'Prof. Pargmann',exam:'2026-07-23',topics:[
  'DE 1st order: separation of variables','DE 1st order: exponential approach','Homogeneous vs inhomogeneous solutions','Linear DE 2nd order with constant coefficients','Fitting integration constants (initial values)','Laplace transform: definition & standard table','Laplace properties & solving IVPs','Functions of several variables: domain & limits','Partial derivatives & total differential','Gradient & directional behaviour','Extreme value determination & Hessian matrix','Double integrals (Cartesian & polar)','Triple integrals (cylindrical & spherical)','Area & volume calculations']}
];

/* ---- cloud sync (Netlify Blobs) ---- */
const SYNC_URL='/.netlify/functions/progress';
const POLL_MS=8000;
const cloudEnabled=location.protocol==='http:'||location.protocol==='https:';
const KEY='ims2_app_v2';

/* ---- utils ---- */
const pad=n=>String(n).padStart(2,'0');
const accentHex={mat:'#f97316',mech:'#a78bfa',prog:'#34d399',elec:'#60a5fa',math:'#f472b6'};
function todayISO(d){d=d||new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function parseDate(iso){const[y,m,dd]=iso.split('-').map(Number);return new Date(y,m-1,dd);}
function midnight(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
function daysUntil(iso){return Math.ceil((parseDate(iso)-midnight(new Date()))/86400000);}
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ---- state: only progress, keyed by subject id ---- */
let state=null;const openSet=new Set();
function fresh(){return {version:3,progress:{},updatedAt:Date.now()};}
function prog(id){const p=state.progress[id]||(state.progress[id]={done:[],minutes:0,last:null,confidence:5,papersTotal:0,papersDone:0});if(p.confidence==null)p.confidence=5;if(p.papersTotal==null)p.papersTotal=0;if(p.papersDone==null)p.papersDone=0;return p;}
function confLabel(c){return c<=2?'Just starting':c<=4?'Shaky':c<=6?'Getting there':c<=8?'Solid':'Exam-ready';}
function papersAdvice(p,exam){const total=p.papersTotal||0,done=p.papersDone||0;if(total<=0)return 'Add how many papers you have.';const rem=Math.max(0,total-done);const dleft=daysUntil(exam);if(rem===0)return `All ${total} done ✓`;if(dleft<=0)return `${rem} left · exam day reached`;const perDay=Math.ceil(rem/dleft);return `${rem} left · do ${perDay}/day to finish in ${dleft} day${dleft===1?'':'s'}`;}
function migrate(raw){
  if(!raw)return null;
  if(raw.version===3&&raw.progress)return raw;
  const p={};
  if(raw.subjects){ // v2 planner format
    raw.subjects.forEach(s=>{if(!SEED.find(x=>x.id===s.id))return;const done=[];(s.topics||[]).forEach((t,i)=>{if(t&&(t.status==='mastered'||t.status==='confident'))done.push(i);});
      const ss=(raw.sessions||[]).filter(e=>e.subjectId===s.id);const mins=ss.reduce((a,e)=>a+(e.durationMin||0),0);const dates=ss.map(e=>e.date).sort();
      const cf=(s.topics||[]).map(t=>+t.confidence||0).filter(x=>x>0);const conf=cf.length?Math.round(cf.reduce((a,b)=>a+b,0)/cf.length):5;
      p[s.id]={done,minutes:Math.round(mins),last:dates.length?dates[dates.length-1]:null,confidence:conf};});
    return {version:3,progress:p,updatedAt:raw.updatedAt||Date.now()};
  }
  if(raw.data){ // v1 legacy {mat:[idx...]}
    Object.keys(raw.data).forEach(k=>{if(Array.isArray(raw.data[k]))p[k]={done:raw.data[k],minutes:0,last:null};});
    return {version:3,progress:p,updatedAt:raw.updatedAt||Date.now()};
  }
  return null;
}
function loadLocal(){try{return migrate(JSON.parse(localStorage.getItem(KEY)));}catch(e){return null;}}
function saveLocal(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function touch(){state.updatedAt=Date.now();saveLocal();schedulePush();render();}

/* ---- sync ---- */
function setStatus(t,c){const el=document.getElementById('syncStatus');if(el){el.textContent='● '+t;el.style.color=c||'var(--muted)';}}
let pushTimer=null;
function schedulePush(){if(!cloudEnabled)return;clearTimeout(pushTimer);pushTimer=setTimeout(pushRemote,500);}
async function pushRemote(){if(!cloudEnabled)return;try{setStatus('syncing…','var(--accent-elec)');
  const r=await fetch(SYNC_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:state,updated_at:state.updatedAt})});
  if(!r.ok)throw 0;setStatus('synced','var(--accent-prog)');}catch(e){setStatus('offline (saved locally)','var(--accent-mat)');}}
async function pullRemote(){if(!cloudEnabled)return;try{const r=await fetch(SYNC_URL,{headers:{'Accept':'application/json'}});if(!r.ok)throw 0;
  const j=await r.json();const at=(j&&j.updated_at)||0;const m=j&&j.data?migrate(j.data):null;
  if(m&&at>state.updatedAt){state=m;saveLocal();render();}
  else if(state.updatedAt>0&&(!m)){pushRemote();}
  setStatus('synced','var(--accent-prog)');}catch(e){setStatus('offline (saved locally)','var(--accent-mat)');}}

/* ---- helpers ---- */
function units(s){const p=prog(s.id);const pt=p.papersTotal||0;const pd=Math.min(p.papersDone||0,pt);return {done:p.done.length+pd,total:s.topics.length+pt};}
function progressFrac(s){const u=units(s);return u.total?u.done/u.total:0;}
function daysSince(id){const l=prog(id).last;return l?Math.floor((midnight(new Date())-midnight(parseDate(l)))/86400000):null;}
function fmtH(min){const h=min/60;return (Math.round(h*10)/10)+'h';}

/* ---- study next ---- */
function studyNext(){
  return SEED.map(s=>{const d=daysUntil(s.exam);const pf=progressFrac(s);const ds=daysSince(s.id);const pr=prog(s.id);const conf=pr.confidence;
    const rem=Math.max(0,(pr.papersTotal||0)-(pr.papersDone||0));const perDay=rem>0?(d>0?Math.ceil(rem/d):rem):0;
    const urgency=d<=0?1:Math.max(0,Math.min(1,(30-d)/30));const gap=1-pf;const stale=Math.min(1,(ds==null?7:ds)/7);const lowConf=(10-conf)/10;const papersLoad=Math.min(1,perDay/4);
    const score=d<0?-1:100*(.35*urgency+.25*gap+.2*lowConf+.15*papersLoad+.05*stale);
    const active=pf>0||(pr.minutes>0);const note=(ds!=null&&ds>=4)?`${ds}d since studied`:(!active?'not started':'');
    return {s,d,pf,ds,conf,perDay,note,score};}).filter(x=>x.score>=0).sort((a,b)=>b.score-a.score).slice(0,3);
}

/* ---- render ---- */
function render(){
  // countdowns
  const bar=document.getElementById('countdownBar');bar.innerHTML='';
  SEED.slice().sort((a,b)=>parseDate(a.exam)-parseDate(b.exam)).forEach(s=>{const d=daysUntil(s.exam);
    bar.insertAdjacentHTML('beforeend',`<div class="cd-chip"><div class="cd-dot" style="background:${accentHex[s.cls]}"></div><span class="cd-label">${esc(s.name.split(' ')[0])}</span><span class="cd-days" style="color:${accentHex[s.cls]}">${d>0?d+'d':d===0?'TODAY':'done'}</span></div>`);});
  // study next
  const nc=document.getElementById('nextCard');const nx=studyNext();
  nc.innerHTML='<div class="section-title">Study next</div>'+(nx.length?nx.map((x,i)=>`<div class="next-item ${x.s.cls}"><span class="next-rank">${i+1}</span><div><div class="next-name">${esc(x.s.name)}</div><div class="next-why">${x.d}d to exam · ${Math.round(x.pf*100)}% done · conf ${x.conf}/10${x.perDay>0?` · ${x.perDay} papers/day`:''}${x.note?` · ${x.note}`:''}</div></div></div>`).join(''):'<div class="time-sub">All exams done 🎉</div>');
  // overall
  let tot=0,done=0;SEED.forEach(s=>{const u=units(s);tot+=u.total;done+=u.done;});
  const pct=tot?Math.round(done/tot*100):0;document.getElementById('ovPct').textContent=pct+'%';document.getElementById('ovBar').style.width=pct+'%';
  // cards
  const wrap=document.getElementById('cards');wrap.innerHTML='';
  SEED.forEach(s=>{
    const p=prog(s.id);const pf=progressFrac(s);const d=daysUntil(s.exam);const ds=daysSince(s.id);
    const open=openSet.has(s.id);
    const card=document.createElement('div');card.className='card '+s.cls+(open?'':' collapsed');card.dataset.sid=s.id;
    let topics='';s.topics.forEach((t,i)=>{const dn=p.done.includes(i);topics+=`<li class="topic-item ${dn?'done':''}" data-i="${i}"><span class="check">${dn?'✓':''}</span><span class="topic-text">${esc(t)}</span></li>`;});
    card.innerHTML=`<div class="accent-bar"></div>
      <div class="subj-head" data-toggle>
        <span class="subj-name">${esc(s.name)}</span>
        <div class="subj-meta"><span class="date-chip">${d>0?d+'d':d===0?'TODAY':'done'}</span><span class="pct-chip">${Math.round(pf*100)}%</span><span class="chevron">▾</span></div>
      </div>
      <div class="prog-bar-wrap"><div class="prog-bar" style="width:${Math.round(pf*100)}%"></div></div>
      <div class="subj-body">
        <div class="prof">${esc(s.prof)}</div>
        <div class="time-row">
          <span class="time-val">${fmtH(p.minutes)}</span>
          <span class="time-sub">logged${ds!=null?` · last studied ${ds===0?'today':ds+'d ago'}`:''}</span>
          <button class="tbtn" data-add="30">+30m</button>
          <button class="tbtn" data-add="60">+1h</button>
          <button class="tbtn" data-add="120">+2h</button>
          <button class="tbtn edit" data-edit>edit</button>
        </div>
        <div class="papers-box">
          <div class="papers-line"><span class="time-sub">Past papers</span><input type="number" class="num" min="0" data-ptotal value="${p.papersTotal}"><span class="time-sub">done</span><input type="number" class="num" min="0" data-pdone value="${p.papersDone}"><button class="tbtn" data-pinc>+1 done</button></div>
          <div class="papers-advice">${esc(papersAdvice(p,s.exam))}</div>
        </div>
        <div class="conf-row"><span class="time-sub">Confidence</span><input type="range" min="1" max="10" value="${p.confidence}" data-conf><span class="conf-val">${p.confidence}/10 · ${confLabel(p.confidence)}</span></div>
        <ul class="topic-list">${topics}</ul>
      </div>`;
    wrap.appendChild(card);
  });
  wireCards();
}

function wireCards(){
  document.querySelectorAll('.card[data-sid]').forEach(card=>{
    const id=card.dataset.sid;
    card.querySelector('[data-toggle]').addEventListener('click',()=>{
      if(openSet.has(id))openSet.delete(id);else openSet.add(id);card.classList.toggle('collapsed');});
    card.querySelectorAll('.topic-item').forEach(li=>li.addEventListener('click',()=>{
      const i=+li.dataset.i;const p=prog(id);const k=p.done.indexOf(i);
      if(k>=0)p.done.splice(k,1);else{p.done.push(i);p.last=todayISO();}touch();}));
    card.querySelectorAll('[data-add]').forEach(b=>b.addEventListener('click',()=>{
      const p=prog(id);p.minutes=Math.max(0,p.minutes+ +b.dataset.add);p.last=todayISO();touch();}));
    const cf=card.querySelector('[data-conf]');if(cf){cf.addEventListener('input',()=>{card.querySelector('.conf-val').textContent=cf.value+'/10 · '+confLabel(+cf.value);});cf.addEventListener('change',()=>{prog(id).confidence=+cf.value;touch();});}
    const pt=card.querySelector('[data-ptotal]');if(pt)pt.addEventListener('change',()=>{prog(id).papersTotal=Math.max(0,Math.round(+pt.value||0));touch();});
    const pd=card.querySelector('[data-pdone]');if(pd)pd.addEventListener('change',()=>{prog(id).papersDone=Math.max(0,Math.round(+pd.value||0));touch();});
    const pi=card.querySelector('[data-pinc]');if(pi)pi.addEventListener('click',()=>{const p=prog(id);p.papersDone=Math.min(p.papersTotal||0,(p.papersDone||0)+1);p.last=todayISO();touch();});
    const ed=card.querySelector('[data-edit]');if(ed)ed.addEventListener('click',()=>{
      const p=prog(id);const cur=Math.round(p.minutes/60*10)/10;
      const v=prompt('Total hours logged for this subject:',cur);if(v===null)return;
      const h=parseFloat(v);if(!isNaN(h)&&h>=0){p.minutes=Math.round(h*60);if(h>0&&!p.last)p.last=todayISO();touch();}});
  });
}

/* ---- init ---- */
state=loadLocal()||fresh();saveLocal();render();
if(cloudEnabled){setStatus('connecting…','var(--accent-elec)');pullRemote();setInterval(pullRemote,POLL_MS);}
else{setStatus('local only (open the Netlify URL to sync)','var(--muted)');}
</script>
